name: Build Album Flipbook image

on:
  push:
    branches: [ main, master ]
    paths:
      - 'me-album-flipbook/**'
      - '.github/workflows/build-album-flipbook.yml'
  workflow_dispatch: # מאפשר להריץ את ה-Action ידנית מכפתור באתר

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: docker/build-push-action@v6
        with:
          context: ./me-album-flipbook
          file: ./me-album-flipbook/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/album-flipbook:1.2.0
            ghcr.io/${{ github.repository_owner }}/album-flipbook:latest