manifestVersion: 1
id: me-album-flipbook
category: media
name: album-flipbook
icon: icon.svg
tagline: Upload albums and protect the viewer with a password
version: "1.2.0"
description: >-
  Self-hosted flipbook for Umbrel with live uploads,
  protected admin access, and an optional viewer password.
