version: "3.7"

services:
  app_proxy:
    environment:
      # תוקן לשם הקונטיינר הנכון בהתאם לתיקייה החדשה
      APP_HOST: me-album-flipbook_server_1
      APP_PORT: 8080

  server:
    image: ghcr.io/tcbr10/album-flipbook:1.3.0
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
